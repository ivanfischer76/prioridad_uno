<section class="flex flex-col items-center justify-center min-h-[70vh]">
    <form class="shadow-xl rounded-xl px-6 pt-6 pb-6 mb-4 w-full max-w-sm bg-transparent">
        <h2 class="text-2xl font-bold mb-6 text-center">
            {{ 'login.title' | translate }}
        </h2>
        <div class="mb-4">
            <label class="block text-gray-700 text-sm font-bold mb-2" for="username">
                {{ 'login.username' | translate }}
            </label>
            <input id="username"
                name="username"
                type="text"
                pInputText
                [(ngModel)]="username"
                class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline"
                [placeholder]="'login.username_placeholder' | translate"
                required
            />
        </div>
        <div class="mb-6">
            <label class="block text-gray-700 text-sm font-bold mb-2" for="password">
                {{ 'login.password' | translate }}
            </label>
            <div class="relative">
                <input id="password"
                    name="password"
                    pInputText
                    [type]="showPassword ? 'text' : 'password'"
                    [(ngModel)]="password"
                    class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 mb-3 leading-tight focus:outline-none focus:shadow-outline pr-10"
                    [placeholder]="'login.password_placeholder' | translate"
                    required
                />
                <span class="absolute right-2 top-1/2 -translate-y-1/2 flex items-center" style="margin-top: -6px">
                    <button type="button" (click)="showPassword = !showPassword" class="text-gray-500 hover:text-gray-700 focus:outline-none">
                        <i class="bi" [ngClass]="showPassword ? 'bi-eye-slash' : 'bi-eye'" style="font-size: 1.2rem;"></i>
                    </button>
                </span>
            </div>
        </div>
        <div class="flex items-center justify-between">
            <button type="submit" class="bg-green-700 hover:bg-green-800 text-white font-bold py-2 px-4 rounded focus:outline-none focus:shadow-outline w-full" (click)="onLogin()">
                {{ 'login.button' | translate }}
            </button>
        </div>
        <div class="flex flex-col items-center mt-4 gap-2">
            <a routerLink="/register" class="inline-block align-baseline font-bold text-sm text-green-700 hover:text-green-900">
                {{ 'login.register_link' | translate }}
            </a>
            <a routerLink="/recuperar" class="inline-block align-baseline font-bold text-sm text-gray-600 hover:text-gray-900">
                {{ 'login.forgot_password' | translate }}
            </a>
            <div *ngIf="loginError" class="text-red-600 text-sm mt-2">
                {{ loginError }}
            </div>
        </div>
    </form>
    <div *ngIf="isLoading" class="flex justify-center items-center mt-4">
        <i class="pi pi-spin pi-spinner text-2xl text-blue-500"></i>
    </div>
</section>
