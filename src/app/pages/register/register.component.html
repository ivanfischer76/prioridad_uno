<section class="flex flex-col items-center justify-center min-h-[70vh]">
    <form
        class="shadow-xl rounded-xl px-6 pt-6 pb-6 mb-4 w-full max-w-2xl bg-transparent"
        autocomplete="off">
        <h2 class="text-3xl text-green-700 font-bold mb-4 text-center">
            {{ 'register.title' | translate }}
        </h2>
        <div class="grid mb-2">
            <div class="col-12">
                <label for="email" class="block text-gray-700 text-sm font-bold mb-2">
                    {{ 'register.email' | translate }}
                </label>
                <input
                    id="email"
                    name="email"
                    type="email"
                    [(ngModel)]="email"
                    (input)="onEmailChange($event)"
                    pInputText
                    [ngModelOptions]="{standalone: true}"
                    class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline"
                    [placeholder]="'register.email_placeholder' | translate"
                    required />
            </div>
            <div class="col-6">
                <label for="username" class="block text-gray-700 text-sm font-bold mb-2">
                    {{ 'register.username' | translate }}
                </label>
                <input
                    id="username"
                    name="username"
                    type="text"
                    [(ngModel)]="username"
                    (input)="onUsernameChange($event)"
                    pInputText
                    [ngModelOptions]="{standalone: true}"
                    class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline"
                    [placeholder]="'register.username_placeholder' | translate"
                    required
                    autocomplete="off"
                />
            </div>
            <div class="col-6">
                <label for="fechaNacimiento" class="block text-gray-700 text-sm font-bold mb-2">
                    {{ 'register.birthdate' | translate }}
                </label>
                <p-calendar
                    id="fechaNacimiento"
                    name="fechaNacimiento"
                    [(ngModel)]="fechaNacimiento"
                    [ngModelOptions]="{standalone: true}"
                    class="w-full"
                    dateFormat="dd/mm/yy"
                    showIcon="true"
                    inputId="fechaNacimientoInput"
                    inputStyleClass="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline"
                    required
                    [showOnFocus]="false"
                    [placeholder]="'register.birthdate_placeholder' | translate"
                ></p-calendar>
                <input
                    #fechaInput
                    id="fechaNacimientoInput"
                    type="text"
                    class="hidden"
                    (input)="onFechaNacimientoInput($event)"
                    (blur)="onFechaNacimientoBlur($event)"
                />
            </div>
        </div>
        <div class="grid mb-2">
            <div class="col-6">
                <label class="block text-gray-700 text-sm font-bold mb-2" for="apellido">
                    {{ 'register.lastname' | translate }}
                </label>
                <input
                    id="apellido"
                    name="apellido"
                    type="text"
                    [(ngModel)]="apellido"
                    (input)="onApellidoChange($event)"
                    pInputText
                    [ngModelOptions]="{standalone: true}"
                    class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline"
                    [placeholder]="'register.lastname_placeholder' | translate"
                    required />
            </div>
            <div class="col-6">
                <label class="block text-gray-700 text-sm font-bold mb-2" for="nombre">
                    {{ 'register.firstname' | translate }}
                </label>
                <input
                    id="nombre"
                    name="nombre"
                    type="text"
                    [(ngModel)]="nombre"
                    (input)="onNombreChange($event)"
                    pInputText
                    [ngModelOptions]="{standalone: true}"
                    class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline"
                    [placeholder]="'register.firstname_placeholder' | translate"
                    required />
            </div>
        </div>
        <div class="grid mb-2">
            <div class="col-12">
                <label class="block text-gray-700 text-sm font-bold mb-2" for="iglesia">
                    {{ 'register.church' | translate }}
                </label>
                <input
                    id="iglesia"
                    name="iglesia"
                    type="text"
                    [(ngModel)]="iglesia"
                    pInputText
                    [ngModelOptions]="{standalone: true}"
                    class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline"
                    [placeholder]="'register.church_placeholder' | translate"
                    required />
            </div>
        </div>
        <div class="grid mb-2">
            <div class="col-6">
                <label class="block text-gray-700 text-sm font-bold mb-2" for="password">
                    {{ 'register.password' | translate }}
                </label>
                <div class="relative">
                    <p-password
                        id="password"
                        name="password"
                        [(ngModel)]="password"
                        [ngModelOptions]="{standalone: true}"
                        [toggleMask]="true"
                        autocomplete="new-password"
                        [promptLabel]="'register.choose_password' | translate"
                        [weakLabel]="'register.weak_password' | translate"
                        [mediumLabel]="'register.medium_password' | translate"
                        [strongLabel]="'register.strong_password' | translate">
                    </p-password>

                    <!-- <input
                        id="password"
                        name="password"
                        [type]="showPassword ? 'text' : 'password'"
                        [(ngModel)]="password"
                        pInputText
                        [ngModelOptions]="{standalone: true}"
                        class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline pr-10"
                        placeholder="********"
                        required
                        autocomplete="new-password"
                    />
                    <span class="absolute right-2 top-1/2 -translate-y-1/2 flex items-center">
                        <button type="button"
                            (click)="showPassword = !showPassword"
                            class="text-gray-500 hover:text-gray-700 focus:outline-none">
                            <i class="bi"
                                [ngClass]="showPassword ? 'bi-eye-slash' : 'bi-eye'"
                                style="font-size: 1.2rem;"></i>
                        </button>
                    </span> -->
                </div>
            </div>
            <div class="col-6">
                <label class="block text-gray-700 text-sm font-bold mb-2" for="repeatPassword">
                    {{ 'register.repeat_password' | translate }}
                </label>
                <div class="relative">
                    <p-password
                        id="repeatPassword"
                        name="repeatPassword"
                        [(ngModel)]="repeatPassword"
                        [ngModelOptions]="{standalone: true}"
                        [toggleMask]="true"
                        autocomplete="new-password"
                        [promptLabel]="'register.repeat_password_prompt' | translate"
                        [weakLabel]="'register.weak_password' | translate"
                        [mediumLabel]="'register.medium_password' | translate"
                        [strongLabel]="'register.strong_password' | translate">
                    </p-password>

                    <!-- <input
                        id="repeatPassword"
                        name="repeatPassword"
                        [type]="showRepeatPassword ? 'text' : 'password'"
                        [(ngModel)]="repeatPassword"
                        pInputText
                        [ngModelOptions]="{standalone: true}"
                        class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline pr-10"
                        placeholder="********"
                        required
                        autocomplete="new-password"
                    />
                    <span class="absolute right-2 top-1/2 -translate-y-1/2 flex items-center">
                        <button type="button"
                            (click)="showRepeatPassword = !showRepeatPassword"
                            class="text-gray-500 hover:text-gray-700 focus:outline-none">
                            <i class="bi"
                                [ngClass]="showRepeatPassword ? 'bi-eye-slash' : 'bi-eye'"
                                style="font-size: 1.2rem;"></i>
                        </button>
                    </span> -->
                </div>
            </div>
        </div>
        <div class="grid">
            <div class="col-12">
                <p-button
                    pRipple
                    [raised]="true"
                    [disabled]="!email || !username || !apellido || !nombre || !password || !repeatPassword || password !== repeatPassword"
                    styleClass="w-full bg-green-700 hover:bg-green-800 text-white font-bold py-2 px-4 rounded focus:outline-none focus:shadow-outline"
                    type="submit"
                    label="{{ 'register.submit' | translate }}">
                </p-button>
            </div>
        </div>
        <div class="flex flex-col items-center mt-4 gap-2">
            <a routerLink="/login"
                class="inline-block align-baseline font-bold text-sm text-green-700 hover:text-green-900">
                {{ 'register.login_link' | translate }}
            </a>
        </div>
    </form>
</section>
