<section class="gestion-contactos-page">
    <p-toast position="top-right"></p-toast>

    <header class="gestion-header">
        <h1>Gestión de contactos</h1>
    </header>

    <div class="panel table-panel">
        <div class="table-actions">
            <p-button
                type="button"
                icon="pi pi-refresh"
                [rounded]="true"
                [text]="true"
                [disabled]="loading"
                pTooltip="Recargar"
                tooltipPosition="top"
                (click)="loadInquiries()">
            </p-button>
        </div>

        <p-table
            [value]="inquiries"
            [paginator]="true"
            [rows]="20"
            [rowsPerPageOptions]="[10, 20, 50]"
            [tableStyle]="{ 'min-width': '70rem' }"
            [loading]="loading"
            [rowHover]="true"
            responsiveLayout="scroll">
            <ng-template pTemplate="header">
                <tr>
                    <th>Email</th>
                    <th>Nombre y apellido</th>
                    <th>Asunto</th>
                    <th>Mensaje</th>
                    <th class="text-center" style="width: 120px;">Acciones</th>
                </tr>
            </ng-template>

            <ng-template pTemplate="body" let-inquiry>
                <tr>
                    <td>{{ inquiry.email }}</td>
                    <td>{{ inquiry.full_name || '-' }}</td>
                    <td>{{ inquiry.subject }}</td>
                    <td class="message-cell" [title]="inquiry.message">{{ previewText(inquiry.message) }}</td>
                    <td class="text-center">
                        <p-button
                            type="button"
                            icon="pi pi-eye"
                            [rounded]="true"
                            [text]="true"
                            pTooltip="Ver mensaje"
                            tooltipPosition="top"
                            (click)="openInquiry(inquiry.id)">
                        </p-button>
                    </td>
                </tr>
            </ng-template>

            <ng-template pTemplate="emptymessage">
                <tr>
                    <td colspan="5" class="empty-cell">No hay mensajes de contacto recibidos.</td>
                </tr>
            </ng-template>
        </p-table>
    </div>
</section>

<p-dialog
    header="Detalle del mensaje"
    [(visible)]="dialogVisible"
    [modal]="true"
    [draggable]="false"
    [resizable]="false"
    [style]="{ width: '75rem', maxWidth: '95vw' }"
    (onHide)="closeDialog()">
    <div *ngIf="loadingDetail" class="dialog-loading">
        Cargando mensaje...
    </div>

    <div *ngIf="!loadingDetail && selectedInquiry" class="dialog-form">
        <div class="grid">
            <div class="col-6">
                <div class="field-block">
                    <label>Nombre y apellido</label>
                    <input pInputText type="text" class="w-full" [value]="selectedInquiry.full_name || ''" readonly />
                </div>
            </div>
            <div class="col-6">
                <div class="field-block">
                    <label>Email</label>
                    <input pInputText type="text" class="w-full" [value]="selectedInquiry.email" readonly />
                </div>
            </div>
        </div>


        <div class="field-block">
            <label>Asunto</label>
            <input pInputText type="text" class="w-full" [value]="selectedInquiry.subject" readonly />
        </div>

        <div class="field-block">
            <label>Mensaje</label>
            <textarea
                pTextarea
                rows="9"
                class="w-full read-only-textarea"
                [value]="selectedInquiry.message"
                readonly>
            </textarea>
        </div>
    </div>
</p-dialog>
